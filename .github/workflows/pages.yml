name: pages

on:
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - 'scripts/build_pages.py'
      - '.github/actions/build-tech-observatory/action.yml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Tech Observatory site
        uses: ./.github/actions/build-tech-observatory
        with:
          data_dir: data
          site_title: Tech Observatory

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: data

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        